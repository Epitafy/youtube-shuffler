<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuffle</title>
    <link rel="icon" type="image/png" href="favicon.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0c;
            --surface: #111114;
            --surface2: #18181d;
            --border: #222228;
            --border2: #2e2e38;
            --text: #e8e8f0;
            --muted: #5a5a6e;
            --accent: #6c63ff;
            --accent-dim: rgba(108,99,255,0.15);
            --accent-glow: rgba(108,99,255,0.3);
            --danger: #ff4f4f;
            --success: #3dffa0;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            overflow: hidden;
        }

        /* ── LAYOUT ── */
        .app {
            display: grid;
            grid-template-rows: 56px 1fr;
            height: 100vh;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .logo {
            font-size: 13px;
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            letter-spacing: 0.12em;
            color: var(--accent);
            white-space: nowrap;
        }

        .url-bar {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .url-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 0 14px;
            height: 34px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .url-input::placeholder { color: var(--muted); }
        .url-input:focus { border-color: var(--accent); }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 34px;
            padding: 0 14px;
            border: none;
            border-radius: 6px;
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { background: #7b73ff; }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; pointer-events: none; }

        .btn-ghost {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border2);
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
        .btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

        .btn-danger {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border2);
        }
        .btn-danger:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,79,79,0.08); }

        .btn-star {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border2);
            font-size: 16px;
        }
        .btn-star:hover { color: #ffc107; border-color: #ffc107; }
        .btn-star.active { color: #ffc107; border-color: #ffc107; }

        /* ── MAIN ── */
        main {
            display: grid;
            grid-template-columns: 1fr 340px;
            overflow: hidden;
        }

        /* ── PLAYER PANE ── */
        .player-pane {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .video-wrap {
            position: relative;
            background: #000;
            flex: 1;
        }
        .video-wrap iframe, #video-placeholder {
            width: 100%;
            height: 100%;
            display: block;
            border: none;
        }

        /* ── DIMMER OVERLAY ── */
        .dimmer-overlay {
            position: absolute;
            inset: 0;
            background: #0a0a0c;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
            z-index: 10;
        }

        /* ── BRIGHTNESS SLIDER ── */
        .brightness-wrap {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-shrink: 0;
        }
        .brightness-icon {
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
            user-select: none;
            font-family: 'DM Mono', monospace;
        }
        .brightness-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 68px;
            height: 3px;
            border-radius: 2px;
            background: var(--border2);
            outline: none;
            cursor: pointer;
        }
        .brightness-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--muted);
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
        }
        .brightness-slider:hover::-webkit-slider-thumb {
            background: var(--text);
            transform: scale(1.25);
        }
        .brightness-slider::-moz-range-thumb {
            width: 11px;
            height: 11px;
            border: none;
            border-radius: 50%;
            background: var(--muted);
            cursor: pointer;
        }


        /* ── BLACKOUT SCREEN ── */
        .blackout-content {
            position: absolute;
            inset: 0;
            z-index: 11;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            pointer-events: none;
        }
        .blackout-content.visible {
            display: flex;
            pointer-events: auto;
            animation: blackoutFadeIn 0.5s ease forwards;
        }

        @keyframes blackoutFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* particles canvas */
        #particleCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .blackout-inner {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            width: 360px;
            max-width: 80vw;
        }

        /* vinyl record */
        .vinyl-wrap {
            position: relative;
            width: 88px;
            height: 88px;
            transition: transform 0.08s ease;
        }
        .vinyl-wrap:active {
            transform: scale(0.93);
        }
        .vinyl {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: conic-gradient(
                #1a1a22 0deg, #0f0f14 30deg, #1a1a22 60deg,
                #0f0f14 90deg, #1a1a22 120deg, #0f0f14 150deg,
                #1a1a22 180deg, #0f0f14 210deg, #1a1a22 240deg,
                #0f0f14 270deg, #1a1a22 300deg, #0f0f14 330deg, #1a1a22 360deg
            );
            animation: vinylSpin 8s linear infinite;
            animation-play-state: paused;
            box-shadow: 0 0 0 1px rgba(108,99,255,0.08),
                        0 0 24px rgba(108,99,255,0.12),
                        0 0 60px rgba(108,99,255,0.06);
        }
        .vinyl::before {
            content: '';
            position: absolute;
            inset: 28px;
            border-radius: 50%;
            background: #0a0a0c;
            box-shadow: inset 0 0 8px rgba(108,99,255,0.15);
        }
        .vinyl::after {
            content: '';
            position: absolute;
            inset: 38px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(108,99,255,0.4) 0%, rgba(108,99,255,0.05) 100%);
        }
        .vinyl-grooves {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: repeating-conic-gradient(
                rgba(255,255,255,0.015) 0deg 1deg,
                transparent 1deg 4deg
            );
            animation: vinylSpin 8s linear infinite;
            animation-play-state: paused;
        }
        @keyframes vinylSpin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* vinyl spins only when playing */
        .vinyl-playing .vinyl,
        .vinyl-playing .vinyl-grooves {
            animation-play-state: running;
        }

        .blackout-title {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: rgba(232,232,240,0.3);
            letter-spacing: 0.1em;
            text-align: center;
            max-width: 100%;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            user-select: none;
        }

        .blackout-seek-wrap {
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
        }

        .blackout-seek {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 2px;
            border-radius: 2px;
            background: rgba(255,255,255,0.08);
            outline: none;
            cursor: pointer;
        }
        .blackout-seek::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(108,99,255,0.8);
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
            box-shadow: 0 0 6px rgba(108,99,255,0.6);
        }
        .blackout-seek:hover::-webkit-slider-thumb {
            background: rgba(108,99,255,1);
            transform: scale(1.4);
            box-shadow: 0 0 12px rgba(108,99,255,0.9);
        }
        .blackout-seek::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border: none;
            border-radius: 50%;
            background: rgba(108,99,255,0.8);
            cursor: pointer;
        }
        .blackout-time {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: rgba(232,232,240,0.2);
            letter-spacing: 0.06em;
            user-select: none;
            white-space: nowrap;
        }

        /* ── EXTRA EYE CANDY ── */

        /* Active queue item glow bar */
        .video-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent), 0 0 20px var(--accent-glow);
        }

        /* Logo pulse glow */
        .logo {
            animation: logoPulse 4s ease-in-out infinite;
            cursor: pointer;
            user-select: none;
            transition: transform 0.12s ease;
        }
        .logo:hover { transform: scale(1.04); }
        .logo:active { transform: scale(0.96); }
        .logo.logo-holding {
            color: var(--danger);
            text-shadow: 0 0 12px rgba(255,79,79,0.8), 0 0 28px rgba(255,79,79,0.3);
            animation: none;
        }

        /* ── RANDOM GIF OVERLAY ── */
        .logo-gif {
            position: absolute;
            left: 0;
            top: 0;
            max-width: 220px;
            max-height: 220px;
            width: auto;
            height: auto;
            opacity: 0;
            transform: scale(0.92);
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
            z-index: 20;
            background: transparent;
            border: none;
            border-radius: 0;
            box-shadow: none;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-user-select: none;
            will-change: left, top;
        }
        .logo-gif.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
            cursor: grab;
        }
        .logo-gif.dragging {
            cursor: grabbing;
            transition: none;
        }
        @keyframes logoPulse {
            0%, 100% { text-shadow: 0 0 8px rgba(108,99,255,0.3); }
            50%       { text-shadow: 0 0 18px rgba(108,99,255,0.7), 0 0 40px rgba(108,99,255,0.2); }
        }

        /* accent line under header */
        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
            animation: headerGlow 6s ease-in-out infinite;
        }
        header { position: relative; }
        @keyframes headerGlow {
            0%, 100% { opacity: 0.3; }
            50%       { opacity: 1; }
        }

        /* Sidebar active item ambient glow */
        .video-item.active {
            box-shadow: inset 0 0 20px rgba(108,99,255,0.05);
        }

        .placeholder {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
        }
        .placeholder-icon { font-size: 40px; opacity: 0.3; }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
            min-height: 56px;
        }

        .controls .spacer { flex: 1; }

        .current-song {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0;
            padding: 0 12px;
            min-width: 0;
            max-width: 100%;
            cursor: pointer;
            position: relative;
        }

        .current-song-title {
            font-size: 12px;
            color: var(--text);
            font-weight: 500;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            word-break: break-word;
            min-width: 0;
            opacity: 1;
            transition: opacity 0.3s ease;
            position: absolute;
            left: 12px;
            right: 0;
        }

        .current-song-title.fade-out {
            opacity: 0;
        }

        .current-song-title.fade-in {
            opacity: 1;
        }

        .btn-repeat {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border2);
            position: relative;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .btn-repeat:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }
        
        .btn-repeat.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }
        
        .btn-repeat.one {
            border-color: var(--success);
            color: var(--success);
        }
        
        .btn-repeat-indicator {
            position: absolute;
            bottom: -6px;
            right: -6px;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            font-size: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
        }

        /* ── QUEUE PANE ── */
        .queue-pane {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--surface);
        }

        .queue-header {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .queue-label {
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
        }
        .queue-count {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.1;
            margin-top: 2px;
        }
        .queue-count span { color: var(--accent); }

        .queue-tabs {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--muted);
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'DM Mono', monospace;
        }

        .tab-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .queue-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .queue-list::-webkit-scrollbar { width: 4px; }
        .queue-list::-webkit-scrollbar-track { background: transparent; }
        .queue-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        .video-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .video-item:hover { background: var(--surface2); }
        .video-item.active {
            background: var(--accent-dim);
            border-left: 2px solid var(--accent);
            padding-left: 14px;
        }

        .video-item img {
            width: 76px;
            height: 42px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--border);
        }

        .video-item-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
        }

        .video-title {
            font-size: 11.5px;
            line-height: 1.4;
            color: var(--text);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .video-item.active .video-title { color: #fff; }

        .video-meta {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
        }

        .playlist-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            border: 1px solid var(--border2);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            margin: 0 12px 8px 12px;
            min-width: 0;
            position: relative;
        }

        .playlist-item:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .playlist-item-title {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.3;
            color: var(--text);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            word-break: break-word;
        }

        .playlist-item-meta {
            display: flex;
            justify-content: space-between;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            gap: 8px;
        }

        .delete-btn {
            padding: 2px 4px;
            font-size: 9px;
            border: none;
            background: transparent;
            color: var(--muted);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
            position: absolute;
            top: 30px;
            right: 8px;
        }

        .delete-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* ── EMPTY / ERROR STATES ── */
        .state-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 8px;
            color: var(--muted);
            font-size: 12px;
            font-family: 'DM Mono', monospace;
            text-align: center;
            padding: 20px;
        }
        .state-empty-icon { font-size: 28px; opacity: 0.25; margin-bottom: 4px; }

        /* ── LOADING ── */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid var(--border2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .url-bar:has(#load-btn:disabled) .spinner {
            display: block;
        }

        /* ── BUTTON PRESS ANIMATIONS ── */
        .btn:active, .tab-btn:active {
            transform: scale(0.93);
            transition: transform 0.08s ease !important;
        }


        /* ── LOBBY / SYNC ── */
        .lobby-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 34px;
            padding: 0 12px;
            border: 1px solid var(--border2);
            border-radius: 6px;
            background: var(--surface2);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .lobby-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
        .lobby-btn.active { border-color: var(--success); color: var(--success); background: rgba(61,255,160,0.08); }
        .lobby-btn .lobby-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--success); box-shadow: 0 0 6px var(--success);
            animation: lobbyPulse 2s ease-in-out infinite;
        }
        @keyframes lobbyPulse {
            0%,100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Modal */
        .lobby-modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65);
            display: none;
            align-items: center; justify-content: center;
            z-index: 100;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .lobby-modal-backdrop.visible { display: flex; }
        .lobby-modal {
            width: 420px; max-width: 92vw;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(108,99,255,0.15);
            display: flex; flex-direction: column; gap: 16px;
        }
        .lobby-modal h3 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            letter-spacing: 0.02em;
            font-size: 18px;
            color: var(--text);
            margin: 0;
        }
        .lobby-modal .lobby-hint {
            font-size: 12px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            line-height: 1.5;
        }
        .lobby-modal .lobby-row { display: flex; gap: 8px; }
        .lobby-modal .lobby-input {
            flex: 1;

<script>
    // --- CONFIG ---
    const API_KEY = 'AIzaSyBaIt7mKZFhneA4vpnTGGrj091rPc0KvCE';

    // --- FIREBASE / LOBBY CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCSg6s8IRc3AkIIK_W2j908i-pAi2NtKX4",
        authDomain: "ytube-shuffle.firebaseapp.com",
        databaseURL: "https://ytube-shuffle-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "ytube-shuffle",
        storageBucket: "ytube-shuffle.firebasestorage.app",
        messagingSenderId: "587529333488",
        appId: "1:587529333488:web:ece98213f96c8502c87035"
    };

    // Initialize Firebase (compat SDK, exposes global `firebase`)
    let _fbApp = null, _fbDb = null;
    try {
        _fbApp = firebase.initializeApp(firebaseConfig);
        _fbDb = firebase.database();
    } catch (e) {
        console.warn('Firebase init failed:', e);
    }

    // LOBBY state
    const LOBBY = {
        db: _fbDb,
        clientId: (() => {
            let id = localStorage.getItem('shuffleClientId');
            if (!id) {
                id = 'c_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
                localStorage.setItem('shuffleClientId', id);
            }
            return id;
        })(),
        userName: localStorage.getItem('shuffleUserName') || '',
        code: null,
        ref: null,
        memberRef: null,
        listeners: [],           // active DB listeners to detach on leave
        applyingRemote: false,   // echo guard when applying remote changes
        serverTimeOffset: 0,
        lastSeekBroadcast: 0,    // for seek throttle
        pendingSeekTimer: null,
        lastState: null,         // last remote snapshot we applied
        suppressNextStateChange: false,
    };

    // Watch server time offset for accurate seek sync
    if (_fbDb) {
        _fbDb.ref('.info/serverTimeOffset').on('value', snap => {
            LOBBY.serverTimeOffset = snap.val() || 0;
        });
    }

    function nowServer() { return Date.now() + LOBBY.serverTimeOffset; }

    function genLobbyCode() {
        const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no O,0,I,1
        let code = '';
        for (let i = 0; i < 6; i++) code += alphabet[Math.floor(Math.random() * alphabet.length)];
        return code;
    }

    function lobbyToast(msg, isError) {
        const t = document.getElementById('lobby-toast');
        if (!t) return;
        t.textContent = msg;
        t.style.borderColor = isError ? 'var(--danger)' : 'var(--border2)';
        t.classList.add('visible');
        clearTimeout(lobbyToast._t);
        lobbyToast._t = setTimeout(() => t.classList.remove('visible'), 2400);
    }

    function openLobbyModal() {
        const modal = document.getElementById('lobby-modal');
        const nameInput = document.getElementById('lobby-name-input');
        const codeInput = document.getElementById('lobby-code-input');
        const errEl = document.getElementById('lobby-error');
        errEl.style.display = 'none';
        nameInput.value = LOBBY.userName || '';
        codeInput.value = '';
        modal.classList.add('visible');
        setTimeout(() => nameInput.focus(), 50);
    }
    function closeLobbyModal() {
        document.getElementById('lobby-modal').classList.remove('visible');
    }
    function lobbyError(msg) {
        const errEl = document.getElementById('lobby-error');
        errEl.textContent = msg;
        errEl.style.display = 'block';
    }

    function getDisplayName() {
        const raw = (document.getElementById('lobby-name-input').value || '').trim();
        const name = raw || LOBBY.userName || ('Guest-' + LOBBY.clientId.slice(-4));
        LOBBY.userName = name;
        localStorage.setItem('shuffleUserName', name);
        return name;
    }

    async function uiCreateLobby() {
        if (!LOBBY.db) { lobbyError('Firebase not initialized'); return; }
        const name = getDisplayName();
        // Find a unique code (try up to 5 times)
        let code = null;
        for (let attempt = 0; attempt < 5; attempt++) {
            const c = genLobbyCode();
            const snap = await LOBBY.db.ref('/lobbies/' + c).once('value');
            if (!snap.exists()) { code = c; break; }
        }
        if (!code) { lobbyError("Couldn't find a free code. Try again."); return; }

        const initial = {
            host: LOBBY.clientId,
            playlistUrl: currentPlaylistUrl || '',
            playlistTitle: currentPlaylistTitle || '',
            queue: currentQueue || [],
            originalList: originalList || [],
            currentIndex: currentIndex || 0,
            playState: 'paused',
            currentTime: 0,
            timeAnchor: firebase.database.ServerValue.TIMESTAMP,
            repeatMode: repeatMode || 0,
            shuffled: originalList && originalList.length > 0 && !arraysEqual(originalList, currentQueue),
            updatedBy: LOBBY.clientId,
            updatedAt: firebase.database.ServerValue.TIMESTAMP,
            createdAt: firebase.database.ServerValue.TIMESTAMP,
        };
        try {
            await LOBBY.db.ref('/lobbies/' + code + '/state').set(initial);
            await _lobbyAttach(code, name);
            closeLobbyModal();
            lobbyToast('Lobby created: ' + code);
        } catch (e) {
            console.warn(e);
            lobbyError('Failed to create lobby: ' + (e && e.message || e));
        }
    }

    async function uiJoinLobby() {
        if (!LOBBY.db) { lobbyError('Firebase not initialized'); return; }
        const raw = (document.getElementById('lobby-code-input').value || '').trim().toUpperCase();
        if (!/^[A-Z0-9]{4,8}$/.test(raw)) { lobbyError('Code must be 4–8 characters (letters/digits)'); return; }
        const name = getDisplayName();
        try {
            const snap = await LOBBY.db.ref('/lobbies/' + raw).once('value');
            if (!snap.exists()) { lobbyError('No lobby found with this code'); return; }
            await _lobbyAttach(raw, name);
            closeLobbyModal();
            lobbyToast('Joined lobby ' + raw);
        } catch (e) {
            console.warn(e);
            lobbyError('Failed to join: ' + (e && e.message || e));
        }
    }

    async function _lobbyAttach(code, name) {
        // If already in another lobby, leave it first
        if (LOBBY.code) await leaveLobby(true);

        LOBBY.code = code;
        LOBBY.ref = LOBBY.db.ref('/lobbies/' + code);
        LOBBY.memberRef = LOBBY.ref.child('members/' + LOBBY.clientId);

        // Register presence with auto-cleanup on disconnect
        await LOBBY.memberRef.set({
            name: name,
            joinedAt: firebase.database.ServerValue.TIMESTAMP,
        });
        LOBBY.memberRef.onDisconnect().remove();

        // Listen to full state snapshot
        const stateListener = LOBBY.ref.child('state').on('value', snap => {
            const state = snap.val();
            if (state) onLobbyRemoteState(state);
        });
        LOBBY.listeners.push({ ref: LOBBY.ref.child('state'), event: 'value', cb: stateListener });

        // Listen to members list
        const membersListener = LOBBY.ref.child('members').on('value', snap => {
            const members = snap.val() || {};
            updateLobbyMembersUI(members);
        });
        LOBBY.listeners.push({ ref: LOBBY.ref.child('members'), event: 'value', cb: membersListener });

        // Update UI pill
        document.getElementById('lobby-btn').style.display = 'none';
        const pill = document.getElementById('lobby-pill');
        pill.classList.add('visible');
        document.getElementById('lobby-pill-code').textContent = code;
    }

    async function leaveLobby(silent) {
        if (!LOBBY.code) return;
        // Detach listeners
        LOBBY.listeners.forEach(({ ref, event, cb }) => { try { ref.off(event, cb); } catch(e){} });
        LOBBY.listeners = [];
        try {
            if (LOBBY.memberRef) {
                await LOBBY.memberRef.onDisconnect().cancel();
                await LOBBY.memberRef.remove();
            }
        } catch(e) { console.warn(e); }
        const leftCode = LOBBY.code;
        LOBBY.code = null;
        LOBBY.ref = null;
        LOBBY.memberRef = null;
        LOBBY.lastState = null;
        document.getElementById('lobby-btn').style.display = '';
        document.getElementById('lobby-pill').classList.remove('visible');
        if (!silent) lobbyToast('Left lobby ' + leftCode);
    }

    function copyLobbyCode() {
        if (!LOBBY.code) return;
        const text = LOBBY.code;
        const done = () => lobbyToast('Code copied: ' + text);
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(() => {
                // fallback
                const ta = document.createElement('textarea');
                ta.value = text; document.body.appendChild(ta); ta.select();
                try { document.execCommand('copy'); done(); } catch(e) {}
                ta.remove();
            });
        }
    }

    function updateLobbyMembersUI(members) {
        const el = document.getElementById('lobby-pill-members');
        if (!el) return;
        const names = Object.values(members).map(m => m && m.name).filter(Boolean);
        el.textContent = names.length;
        el.title = names.join(', ') || '—';
    }

    // Broadcast helpers
    function lobbyBroadcast(patch) {
        if (!LOBBY.ref || LOBBY.applyingRemote || LOBBY.suppressBroadcast) return;
        patch.updatedBy = LOBBY.clientId;
        patch.updatedAt = firebase.database.ServerValue.TIMESTAMP;
        LOBBY.ref.child('state').update(patch).catch(err => console.warn('broadcast failed:', err));
    }

    // Broadcast current playback time + state (called on play/pause and on seek)
    function broadcastPlayback(playState, currentTime) {
        if (!LOBBY.ref) return;
        const patch = {};
        if (playState) patch.playState = playState;
        if (typeof currentTime === 'number' && !isNaN(currentTime)) {
            patch.currentTime = currentTime;
            patch.timeAnchor = firebase.database.ServerValue.TIMESTAMP;
        }
        lobbyBroadcast(patch);
    }

    // Apply remote state snapshot
    function onLobbyRemoteState(state) {
        if (!state) return;
        // Ignore our own writes (echo)
        if (state.updatedBy === LOBBY.clientId && LOBBY.lastState) { LOBBY.lastState = state; return; }

        const prev = LOBBY.lastState;
        LOBBY.applyingRemote = true;
        try {
            // 1. Playlist URL changed → load queue from state (no API fetch)
            const _toArr2 = v => Array.isArray(v) ? v : (v && typeof v === 'object') ? Object.keys(v).sort((a,b)=>+a-+b).map(k => v[k]) : [];
            const playlistChanged = !prev || state.playlistUrl !== prev.playlistUrl;
            const queueChanged = !prev || !arraysEqualById(_toArr2(state.queue), _toArr2(prev.queue));

            // Firebase может возвращать массив как объект с числовыми ключами
            const toArr = v => Array.isArray(v) ? v.slice() : (v && typeof v === 'object') ? Object.keys(v).sort((a,b)=>+a-+b).map(k => v[k]) : [];
            if (playlistChanged && state.playlistUrl) {
                currentPlaylistUrl = state.playlistUrl;
                currentPlaylistTitle = state.playlistTitle || '';
                originalList = toArr(state.originalList);
                currentQueue = toArr(state.queue);
                document.getElementById('playlist-url').value = state.playlistUrl;
                document.getElementById('video-count').innerText = `${currentQueue.length} videos`;
                repeatMode = state.repeatMode || 0;
                try { updateRepeatButton(); } catch(e) {}
                try { applyCachedDurations(currentQueue); } catch(e) {}
                renderList();
                try { fetchMissingDurations(currentQueue); } catch(e) {}
                try { updateStarButton(); } catch(e) {}
            } else if (queueChanged && state.queue) {
                // Shuffle/unshuffle happened
                currentQueue = toArr(state.queue);
                if (state.originalList) originalList = toArr(state.originalList);
                renderList();
            }

            // 2. Force-load видео по фактическому ID, а не по индексу.
            // Иначе: при смене плейлиста индекс остаётся 0→0 → проверка пропускает loadVideoById,
            // и я продолжаю слушать старый трек.
            const targetIndex = (typeof state.currentIndex === 'number') ? state.currentIndex : currentIndex;
            const targetVideo = currentQueue[targetIndex];
            let videoLoadedNow = false;
            if (targetVideo) {
                let curVid = '';
                try {
                    if (player && typeof player.getVideoData === 'function') {
                        curVid = (player.getVideoData() || {}).video_id || '';
                    }
                } catch(e) {}
                if (curVid !== targetVideo.id) {
                    playVideo(targetIndex);
                    videoLoadedNow = true;
                } else if (targetIndex !== currentIndex) {
                    // Видео то же, но индекс разъехался — обновим подсветку в списке.
                    currentIndex = targetIndex;
                    document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
                    const a = document.getElementById(`v-${currentIndex}`);
                    if (a) { a.classList.add('active'); a.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
                }
            }

            // 3. Playback time / state — пропускаем, если только что начали грузить новое видео
            // (я сам выставил currentTime=0/play в playVideo, для seek будет отдельный тик)
            if (!videoLoadedNow && player && typeof player.getPlayerState === 'function') {
                const localState = player.getPlayerState();
                const wantPlaying = state.playState === 'playing';
                let target = typeof state.currentTime === 'number' ? state.currentTime : null;
                if (target !== null && wantPlaying && state.timeAnchor) {
                    const elapsed = (nowServer() - state.timeAnchor) / 1000;
                    if (elapsed > 0 && elapsed < 3600) target += elapsed;
                }
                if (target !== null) {
                    try {
                        const cur = player.getCurrentTime();
                        if (Math.abs(cur - target) > 1.2) player.seekTo(target, true);
                    } catch(e) {}
                }
                if (wantPlaying && localState !== 1 && localState !== 3) {
                    try { player.playVideo(); } catch(e) {}
                } else if (!wantPlaying && localState === 1) {
                    try { player.pauseVideo(); } catch(e) {}
                }
            }
        } catch (e) {
            console.warn('apply remote state error:', e);
        } finally {
            LOBBY.lastState = state;
            // release echo guard after YT state settles
            setTimeout(() => { LOBBY.applyingRemote = false; }, 250);
        }
    }

    // Array helpers
    function arraysEqual(a, b) {
        if (!Array.isArray(a) || !Array.isArray(b) || a.length !== b.length) return false;
        for (let i = 0; i < a.length; i++) if ((a[i] && a[i].id) !== (b[i] && b[i].id)) return false;
        return true;
    }
    function arraysEqualById(a, b) { return arraysEqual(a, b); }

    // Allow leaving cleanly on tab close (onDisconnect also handles this)
    window.addEventListener('beforeunload', () => {
        try { if (LOBBY.memberRef) LOBBY.memberRef.remove(); } catch(e) {}
    });

    // --- LOGO GIF CONFIG ---
    // Место для гифок: папка `gifs/` рядом с этим index.html.
    // Впиши сюда имена файлов, которые положил(а) в папку gifs/.
    // Можно добавлять/удалять сколько угодно.
    const LOGO_GIF_FOLDER = 'gifs/';
    const LOGO_GIF_FILES = Array.from({ length: 31 }, (_, i) => `gif${i + 1}.gif`);
    let _logoGifLastIndex = -1;

    // Удерживать логотип столько мс — чтобы сработало "очистить все гифки"
    const LOGO_LONG_PRESS_MS = 550;

    function clearAllLogoGifs() {
        const gifs = document.querySelectorAll('.logo-gif');
        gifs.forEach(g => {
            g.classList.remove('visible');
            setTimeout(() => g.remove(), 260);
        });

    function wireLogoInteractions() {
        const logo = document.getElementById('logo');
        if (!logo) return;

        let pressTimer = null;
        let longPressed = false;
        let pressX = 0, pressY = 0;

        const cancelTimer = () => {
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            logo.classList.remove('logo-holding');
        };

        const onDown = (e) => {
            longPressed = false;
            const pt = (e.touches && e.touches[0]) || e;
            pressX = pt.clientX; pressY = pt.clientY;
            cancelTimer();
            logo.classList.add('logo-holding');
            pressTimer = setTimeout(() => {
                longPressed = true;
                pressTimer = null;
                logo.classList.remove('logo-holding');
                clearAllLogoGifs();
            }, LOGO_LONG_PRESS_MS);
        };
        const onMove = (e) => {
            if (!pressTimer) return;
            const pt = (e.touches && e.touches[0]) || e;
            if (Math.hypot(pt.clientX - pressX, pt.clientY - pressY) > 6) {
                cancelTimer();
            }
        };
        const onUp = () => {
            cancelTimer();
        };
        const onClick = (e) => {
            // Если было длинное нажатие — подавляем клик
            if (longPressed) { longPressed = false; e.preventDefault(); e.stopPropagation(); return; }
            showRandomLogoGif();
        };

        logo.addEventListener('mousedown', onDown);
        logo.addEventListener('mousemove', onMove);
        logo.addEventListener('mouseup', onUp);
        logo.addEventListener('mouseleave', onUp);
        logo.addEventListener('click', onClick);
        logo.addEventListener('touchstart', onDown, { passive: true });
        logo.addEventListener('touchmove', onMove, { passive: true });
        logo.addEventListener('touchend', onUp);
        logo.addEventListener('touchcancel', onUp);
    }

    // ── DURATION CACHE & FETCH ──
    const DURATION_CACHE_KEY = 'shuffleDurationCache';
    let _durationCache = null;

    function getDurationCache() {
        if (_durationCache) return _durationCache;
        try {
            _durationCache = JSON.parse(localStorage.getItem(DURATION_CACHE_KEY) || '{}') || {};
        } catch (_) { _durationCache = {}; }
        return _durationCache;
    }
    function saveDurationCache() {
        try { localStorage.setItem(DURATION_CACHE_KEY, JSON.stringify(_durationCache || {})); } catch (_) {}
    }

    // ISO 8601 duration -> "H:MM:SS" или "M:SS"
    function formatISODuration(iso) {
        if (!iso) return '';
        const m = iso.match(/^P(?:(\d+)D)?T?(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?$/);
        if (!m) return '';
        const days = parseInt(m[1] || 0, 10);
        let h = parseInt(m[2] || 0, 10);
        const min = parseInt(m[3] || 0, 10);
        const s = parseInt(m[4] || 0, 10);
        h += days * 24;
        const pad = n => String(n).padStart(2, '0');
        if (h > 0) return `${h}:${pad(min)}:${pad(s)}`;
        return `${min}:${pad(s)}`;
    }

    function applyCachedDurations(list) {
        const cache = getDurationCache();
        list.forEach(v => {
            if (cache[v.id]) v.duration = cache[v.id];
        });
    }

    function updateDurationDom(videoId, text) {
        const nodes = document.querySelectorAll(`.video-duration[data-vid="${videoId}"]`);
        nodes.forEach(n => { n.textContent = text; });
    }

    async function fetchMissingDurations(list) {
        const cache = getDurationCache();
        const missing = list.filter(v => !cache[v.id]).map(v => v.id);
        if (!missing.length) return;

        // Батчами по 50 id, параллельно, но с ограничением по количеству
        const batches = [];
        for (let i = 0; i < missing.length; i += 50) {
            batches.push(missing.slice(i, i + 50));
        }

        const CONCURRENCY = 3;
        let cursor = 0;
        const worker = async () => {
            while (cursor < batches.length) {
                const my = batches[cursor++];
                try {
                    const url = `https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${my.join(',')}&key=${API_KEY}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    if (data.error) { console.warn('[duration] api error', data.error.message); continue; }
                    (data.items || []).forEach(it => {
                        const dur = formatISODuration(it.contentDetails && it.contentDetails.duration);
                        if (!dur) return;
                        cache[it.id] = dur;
                        // Обновляем модель
                        const v = list.find(x => x.id === it.id);
                        if (v) v.duration = dur;
                        updateDurationDom(it.id, dur);
                    });
                } catch (err) {
                    console.warn('[duration] fetch failed', err);
                }
            }
        };
        const workers = Array.from({ length: Math.min(CONCURRENCY, batches.length) }, worker);
        await Promise.all(workers);
        saveDurationCache();
    }

    function showRandomLogoGif() {
        const container = document.getElementById('video-container');
        if (!container || !LOGO_GIF_FILES.length) return;

        // Выбираем случайную гифку, стараясь не повторять предыдущую
        let idx = Math.floor(Math.random() * LOGO_GIF_FILES.length);
        if (LOGO_GIF_FILES.length > 1 && idx === _logoGifLastIndex) {
            idx = (idx + 1) % LOGO_GIF_FILES.length;
        }
        _logoGifLastIndex = idx;

        const src = LOGO_GIF_FOLDER + LOGO_GIF_FILES[idx];

        const img = document.createElement('img');
        img.className = 'logo-gif';
        img.alt = '';
        img.draggable = false;
        // Не добавляем cache-buster: одинаковый URL → браузер переиспользует
        // уже декодированные кадры из image cache, и каждый новый <img>
        // сам по себе запускает анимацию с нуля. Это резко снижает расход памяти
        // при многократных кликах по логотипу.
        img.src = src;

        img.addEventListener('error', () => {
            console.warn('[logo-gif] не удалось загрузить', src);
            img.remove();
        });

        // Позиционируем в случайной точке внутри плеера после загрузки
        const placeRandom = () => {
            const rect = container.getBoundingClientRect();
            const w = img.offsetWidth || 180;
            const h = img.offsetHeight || 180;
            // фиксируем базовые размеры для ресайза колесиком
            img.dataset.baseW = w;
            img.dataset.baseH = h;
            img.dataset.scale = '1';
            const maxX = Math.max(0, rect.width - w);
            const maxY = Math.max(0, rect.height - h);
            img.style.left = Math.floor(Math.random() * maxX) + 'px';
            img.style.top = Math.floor(Math.random() * maxY) + 'px';
            requestAnimationFrame(() => img.classList.add('visible'));
        };
        img.addEventListener('load', placeRandom, { once: true });

        // Ресайз колесиком мыши
        attachLogoGifWheelResize(img, container);

        // Закрытие по двойному клику на гифку
        img.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            img.classList.remove('visible');
            setTimeout(() => img.remove(), 260);
        });

        // Драг по плееру
        attachLogoGifDrag(img, container);

        container.appendChild(img);

        // На всякий случай — если load уже выстрелил из кеша
        if (img.complete && img.naturalWidth) placeRandom();
    }

    // Ограничения масштаба при ресайзе колесиком
    const LOGO_GIF_MIN_SCALE = 0.25;
    const LOGO_GIF_MAX_SCALE = 4.0;
    const LOGO_GIF_WHEEL_STEP = 1.12; // множитель за один тик колеса

    function attachLogoGifWheelResize(el, container) {
        el.addEventListener('wheel', (e) => {
            e.preventDefault();
            e.stopPropagation();

            // Если по какой-то причине базовые размеры ещё не зафиксированы — берём текущие
            if (!el.dataset.baseW || !el.dataset.baseH) {
                el.dataset.baseW = el.offsetWidth;
                el.dataset.baseH = el.offsetHeight;
                el.dataset.scale = '1';
            }
            const baseW = parseFloat(el.dataset.baseW) || el.offsetWidth;
            const baseH = parseFloat(el.dataset.baseH) || el.offsetHeight;

            let scale = parseFloat(el.dataset.scale || '1') || 1;
            const factor = e.deltaY > 0 ? 1 / LOGO_GIF_WHEEL_STEP : LOGO_GIF_WHEEL_STEP;
            const newScale = Math.max(LOGO_GIF_MIN_SCALE, Math.min(LOGO_GIF_MAX_SCALE, scale * factor));
            if (newScale === scale) return;

            const oldW = baseW * scale;
            const oldH = baseH * scale;
            const newW = baseW * newScale;
            const newH = baseH * newScale;

            // Точка под курсором на картинке (в процентах), чтобы зум "к курсору"
            const rect = el.getBoundingClientRect();
            const cx = (e.clientX - rect.left) / (oldW || rect.width);
            const cy = (e.clientY - rect.top) / (oldH || rect.height);

            let left = el.offsetLeft - (newW - oldW) * cx;
            let top = el.offsetTop - (newH - oldH) * cy;

            // Клампим позицию к границам плеера (с учётом оверсайза)
            const cRect = container.getBoundingClientRect();
            const minX = Math.min(0, cRect.width - newW);
            const maxX = Math.max(0, cRect.width - newW);
            const minY = Math.min(0, cRect.height - newH);
            const maxY = Math.max(0, cRect.height - newH);
            left = Math.max(minX, Math.min(maxX, left));
            top = Math.max(minY, Math.min(maxY, top));

            el.dataset.scale = String(newScale);
            el.style.maxWidth = 'none';
            el.style.maxHeight = 'none';
            el.style.width = newW + 'px';
            el.style.height = newH + 'px';
            el.style.left = left + 'px';
            el.style.top = top + 'px';
        }, { passive: false });
    }

    function attachLogoGifDrag(el, container) {
        // Используем Pointer Events + setPointerCapture: все слушатели живут
        // на самом элементе, а не на document — поэтому при удалении гифки
        // они корректно уходят на сборку мусора, без утечек.
        let dragging = false;
        let activePointerId = null;
        let startX = 0, startY = 0, origLeft = 0, origTop = 0;

        const onDown = (e) => {
            if (e.button !== undefined && e.button !== 0) return;
            dragging = true;
            activePointerId = e.pointerId;
            startX = e.clientX;
            startY = e.clientY;
            origLeft = el.offsetLeft;
            origTop = el.offsetTop;
            try { el.setPointerCapture(e.pointerId); } catch (_) {}
            el.classList.add('dragging');
            el.style.zIndex = 21;
            e.preventDefault();
        };
        const onMove = (e) => {
            if (!dragging || e.pointerId !== activePointerId) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            const cRect = container.getBoundingClientRect();
            let nx = origLeft + dx;
            let ny = origTop + dy;
            // Если гифка больше плеера — разрешаем уводить её за край
            const minX = Math.min(0, cRect.width - el.offsetWidth);
            const maxX = Math.max(0, cRect.width - el.offsetWidth);
            const minY = Math.min(0, cRect.height - el.offsetHeight);
            const maxY = Math.max(0, cRect.height - el.offsetHeight);
            nx = Math.max(minX, Math.min(maxX, nx));
            ny = Math.max(minY, Math.min(maxY, ny));
            el.style.left = nx + 'px';
            el.style.top = ny + 'px';
        };
        const onUp = (e) => {
            if (!dragging) return;
            if (activePointerId !== null && e.pointerId !== activePointerId) return;
            dragging = false;
            activePointerId = null;
            el.classList.remove('dragging');
            el.style.zIndex = 20;
            try { el.releasePointerCapture(e.pointerId); } catch (_) {}
        };

        el.addEventListener('pointerdown', onDown);
        el.addEventListener('pointermove', onMove);
        el.addEventListener('pointerup', onUp);
        el.addEventListener('pointercancel', onUp);

        // чтобы перетаскивание не выделяло картинку
        el.addEventListener('dragstart', (e) => e.preventDefault());
    }

    function switchTab(tab) {

        const favSection = document.getElementById('favorites-section');

        if (tab === 'queue') {

    function toggleFavorite() {
        if (!currentPlaylistUrl) { alert('Load playlist first'); return; }
        const existingIndex = favorites.findIndex(f => f.url === currentPlaylistUrl);
        const starBtn = document.getElementById('star-btn');
        if (existingIndex > -1) {
            favorites.splice(existingIndex, 1);
            starBtn.classList.remove('active');
        } else {
            favorites.push({ url: currentPlaylistUrl, title: currentPlaylistTitle, videoCount: currentQueue.length, savedAt: new Date().toISOString() });
            starBtn.classList.add('active');
        }
        saveFavorites();
        updateFavoritesUI();
    }

    function updateFavoritesUI() {
        const favList = document.getElementById('favorites-list');
        document.getElementById('favorites-count').innerText = `${favorites.length} saved`;
        if (favorites.length === 0) {
            favList.innerHTML = `<div class="state-empty"><div class="state-empty-icon">★</div><div>No saved playlists</div></div>`;
            return;
        }
        favList.innerHTML = '';
        favorites.forEach((fav, index) => {
            const div = document.createElement('div');
            div.className = 'playlist-item';
            div.onclick = () => loadFavoritPlaylist(index);
            div.innerHTML = `
                <div class="playlist-item-title" title="${fav.title}">${fav.title}</div>
                <div class="playlist-item-meta"><span>${fav.videoCount} videos</span></div>
                <button class="delete-btn" onclick="event.stopPropagation(); deleteFavorite(${index})">🗑️</button>
            `;
            favList.appendChild(div);
        });

    function loadFavoritPlaylist(index) {
        if (index < 0 || index >= favorites.length) return;
        document.getElementById('playlist-url').value = favorites[index].url;
        loadPlaylist();
    }

    function deleteFavorite(index) {
        if (confirm('Are you sure?')) {
            const deletedUrl = favorites[index].url;
            favorites.splice(index, 1);
            saveFavorites();
            updateFavoritesUI();
            if (currentPlaylistUrl === deletedUrl) document.getElementById('star-btn').classList.remove('active');

    function updateStarButton() {
        const starBtn = document.getElementById('star-btn');
        const isFavorite = favorites.some(f => f.url === currentPlaylistUrl);
        if (isFavorite) starBtn.classList.add('active');
        else starBtn.classList.remove('active');
    }

    async function getPlaylistTitle(playlistId) {
        try {
            const apiUrl = `https://www.googleapis.com/youtube/v3/playlists?part=snippet&id=${playlistId}&key=${API_KEY}`;
            const response = await fetch(apiUrl);
            const data = await response.json();
            if (data.items && data.items.length > 0) return data.items[0].snippet.title;
            return `Playlist ${new Date().toLocaleString()}`;
        } catch (error) {
            return `Playlist ${new Date().toLocaleString()}`;
        }
    }

    // Initialize YouTube API
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('video-placeholder', {
            events: {
                'onStateChange': (e) => {
                    if (e.data === YT.PlayerState.ENDED) handleVideoEnd();
                    // Vinyl spins only when actually playing
                    setVinylSpin(e.data === YT.PlayerState.PLAYING);
                    // Broadcast play/pause в лобби (с текущим временем)
                    if (LOBBY.ref && !LOBBY.applyingRemote) {
                        if (e.data === YT.PlayerState.PLAYING) {
                            try { broadcastPlayback('playing', player.getCurrentTime()); } catch(err) {}
                        } else if (e.data === YT.PlayerState.PAUSED) {
                            try { broadcastPlayback('paused', player.getCurrentTime()); } catch(err) {}
                        }
                    }
                },
                'onError': (e) => {
                    console.error("Player error:", e.data);
                    setTimeout(nextVideo, 2000);
                }
            }
        });
        loadFavorites();
        wireLogoInteractions();
        const songElement = document.getElementById('current-song');
        songElement.addEventListener('mouseenter', handleSongMouseEnter);
    }

    function handleVideoEnd() {
        if (repeatMode === 2) playVideo(currentIndex);
        else nextVideo();
    }

    async function loadPlaylist() {
        const url = document.getElementById('playlist-url').value;
        const match = url.match(/[&?]list=([^&]+)/);
        const playlistId = match ? match[1] : null;
        if (!playlistId) { alert('Please paste a valid YouTube playlist link'); return; }

        currentPlaylistUrl = url;
        const btn = document.getElementById('load-btn');
        btn.disabled = true;
        btn.innerText = "Loading...";

        try {
            currentPlaylistTitle = await getPlaylistTitle(playlistId);
            originalList = [];
            let nextPageToken = '';
            do {
                const apiUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${API_KEY}&pageToken=${nextPageToken}`;
                const response = await fetch(apiUrl);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                const items = data.items.map(item => {
                    const s = item.snippet;
                    const thumb = s.thumbnails?.medium?.url || s.thumbnails?.default?.url || 'https://via.placeholder.com/120x68?text=No+Thumb';
                    return { id: s.resourceId.videoId, title: s.title, thumb: thumb };
                });
                originalList = originalList.concat(items);
                nextPageToken = data.nextPageToken;
                btn.innerText = `Loaded ${originalList.length}...`;
            } while (nextPageToken);

            currentQueue = [...originalList];
            document.getElementById('video-count').innerText = `${originalList.length} videos`;
            currentIndex = 0;
            repeatMode = 0;
            updateRepeatButton();
            // Подставляем длительности из кеша мгновенно, остальные подтянем фоном
            applyCachedDurations(originalList);
            renderList();
            // Подавляем внутренний broadcast из playVideo, чтобы
            // отправить всё одной атомарной записью ниже (сначала queue+url, потом index).
            LOBBY.suppressBroadcast = true;
            try { playVideo(0); } finally { LOBBY.suppressBroadcast = false; }
            updateStarButton();
            // Синхронизация с лобби: при загрузке плейлиста шлём полный state одной записью
            if (LOBBY.ref && !LOBBY.applyingRemote) {
                lobbyBroadcast({
                    playlistUrl: currentPlaylistUrl || '',
                    playlistTitle: currentPlaylistTitle || '',
                    queue: currentQueue.slice(),
                    originalList: originalList.slice(),
                    currentIndex: 0,
                    playState: 'playing',
                    currentTime: 0,
                    timeAnchor: firebase.database.ServerValue.TIMESTAMP,
                    repeatMode: repeatMode || 0,
                    shuffled: false,
                });
            }
            // Фоново догружаем недостающие длительности, не блокируя UI
            fetchMissingDurations(originalList);
        } catch (error) {
            console.error("API Error:", error);
            alert("Error loading playlist: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Load";
        }
    }

    function renderList() {
        const container = document.getElementById('playlist-items');
        container.innerHTML = '';
        const fragment = document.createDocumentFragment();
        currentQueue.forEach((video, index) => {
            const div = document.createElement('div');
            div.className = `video-item ${index === currentIndex ? 'active' : ''}`;
            div.id = `v-${index}`;
            div.onclick = () => playVideo(index);
            div.innerHTML = `
                <img src="${video.thumb}" loading="lazy">
                <div class="video-item-info">
                    <div class="video-title">${video.title}</div>
                    <div class="video-meta"><span class="video-duration" data-vid="${video.id}">${video.duration || '—:—'}</span></div>
                </div>
            `;
            fragment.appendChild(div);
        });
        container.appendChild(fragment);
        const activeElem = document.getElementById(`v-${currentIndex}`);
        if (activeElem) activeElem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function playVideo(index) {
        if (index < 0 || index >= currentQueue.length) return;
        currentIndex = index;
        player.loadVideoById(currentQueue[currentIndex].id);
        updateMediaSession();
        if (!isShowingPlaylistName) updateCurrentSongDisplay();
        document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
        const activeElem = document.getElementById(`v-${currentIndex}`);
        if (activeElem) {
            activeElem.classList.add('active');
            activeElem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        // Broadcast: смена трека — с currentTime=0 и play
        if (LOBBY.ref && !LOBBY.applyingRemote) {
            lobbyBroadcast({
                currentIndex: currentIndex,
                playState: 'playing',
                currentTime: 0,
                timeAnchor: firebase.database.ServerValue.TIMESTAMP,
            });
        }
    }

    function nextVideo() {
        if (currentIndex < currentQueue.length - 1) playVideo(currentIndex + 1);
        else if (repeatMode === 1) playVideo(0);
    }

    function prevVideo() {
        if (currentIndex > 0) playVideo(currentIndex - 1);
    }

    function shufflePlaylist() {
        if (currentQueue.length === 0) return;
        for (let i = currentQueue.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentQueue[i], currentQueue[j]] = [currentQueue[j], currentQueue[i]];
        }
        currentIndex = 0;
        // Broadcast новый порядок очереди ДО playVideo,
        // чтобы другие успели обновить список перед сменой индекса.
        if (LOBBY.ref && !LOBBY.applyingRemote) {
            lobbyBroadcast({
                queue: currentQueue.slice(),
                shuffled: true,
            });
        }
        playVideo(currentIndex);
        renderList();
    }

    function unshufflePlaylist() {
        if (originalList.length === 0) return;
        const currentVideo = currentQueue[currentIndex];
        currentQueue = [...originalList];
        currentIndex = currentQueue.indexOf(currentVideo);
        if (LOBBY.ref && !LOBBY.applyingRemote) {
            lobbyBroadcast({
                queue: currentQueue.slice(),
                shuffled: false,
            });
        }
        playVideo(currentIndex);
        renderList();
    }

    let isBlackedOut = false;
    let seekPollInterval = null;

    function toggleBlackout() {
        isBlackedOut = !isBlackedOut;
        const icon = document.getElementById("brightnessIcon");
        const blackoutEl = document.getElementById("blackoutContent");
        if (isBlackedOut) {
            document.getElementById("dimmerOverlay").style.opacity = "1";
            icon.style.color = "var(--accent)";
            icon.title = "Restore video";
            blackoutEl.classList.add("visible");
            const titleEl = document.getElementById("current-song-title");
            document.getElementById("blackoutTitle").textContent = titleEl ? titleEl.textContent : "—";
            startSeekPoll();
        } else {
            const slider = document.getElementById("brightnessSlider");
            setDim(slider.value);
            icon.style.color = "";
            icon.title = "Toggle blackout";
            blackoutEl.classList.remove("visible");
            stopSeekPoll();
        }
    }

    function setDim(value) {
        if (isBlackedOut) return;
        const overlay = document.getElementById("dimmerOverlay");
        overlay.style.opacity = (value / 100).toFixed(2);
        const slider = document.getElementById("brightnessSlider");
        const pct = (value / 85) * 100;
        slider.style.background = `linear-gradient(to right, var(--border) ${pct}%, var(--border2) ${pct}%)`;
    }

    function formatTime(sec) {
        if (!sec || isNaN(sec)) return "0:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ":" + String(s).padStart(2, "0");
    }

    function startSeekPoll() {
        stopSeekPoll();
        seekPollInterval = setInterval(() => {
            if (!player || typeof player.getCurrentTime !== "function") return;
            try {
                const cur = player.getCurrentTime();
                const dur = player.getDuration();
                if (dur > 0) {
                    const pct = (cur / dur) * 100;
                    const seekEl = document.getElementById("blackoutSeek");
                    seekEl.value = pct;
                    seekEl.style.background = `linear-gradient(to right, rgba(255,255,255,0.35) ${pct}%, rgba(255,255,255,0.08) ${pct}%)`;
                    document.getElementById("blackoutTime").textContent = formatTime(cur) + " / " + formatTime(dur);
                }
                const titleEl = document.getElementById("current-song-title");
                if (titleEl) document.getElementById("blackoutTitle").textContent = titleEl.textContent;
            } catch(e) {}
        }, 1000);
    }

    function stopSeekPoll() {
        if (seekPollInterval) { clearInterval(seekPollInterval); seekPollInterval = null; }
    }

    function seekFromBlackout(pct) {
        if (!player || typeof player.getDuration !== "function") return;
        try {
            const dur = player.getDuration();
            const targetTime = (pct / 100) * dur;
            player.seekTo(targetTime, true);
            const seekEl = document.getElementById("blackoutSeek");
            seekEl.style.background = `linear-gradient(to right, rgba(255,255,255,0.35) ${pct}%, rgba(255,255,255,0.08) ${pct}%)`;
            // Broadcast seek в лобби, но throttle до 200мс + финальный запись через 350мс
            if (LOBBY.ref && !LOBBY.applyingRemote) {
                const now = Date.now();
                if (now - LOBBY.lastSeekBroadcast > 200) {
                    LOBBY.lastSeekBroadcast = now;
                    broadcastPlayback(null, targetTime);
                }
                clearTimeout(LOBBY.pendingSeekTimer);
                LOBBY.pendingSeekTimer = setTimeout(() => {
                    try { broadcastPlayback(null, player.getCurrentTime()); } catch(e) {}
                }, 350);
            }
        } catch(e) {}
    }

    // ── VINYL SPIN CONTROL ──
    function setVinylSpin(playing) {
        const vinylWrap = document.querySelector('.vinyl-wrap');
        if (!vinylWrap) return;
        if (playing) vinylWrap.classList.add('vinyl-playing');
        else vinylWrap.classList.remove('vinyl-playing');
    }

    // Click on vinyl = toggle play/pause
    function toggleBlackoutPlay() {
        if (!player || typeof player.getPlayerState !== 'function') return;
        const state = player.getPlayerState();
        if (state === 1) player.pauseVideo();
        else player.playVideo();
        // setVinylSpin is called automatically via onStateChange
    }

    // ── MEDIA SESSION API ──
    function updateMediaSession() {
        if (!('mediaSession' in navigator)) return;
        const video = currentQueue[currentIndex];
        if (!video) return;
        const audio = document.getElementById('silentAudio');
        if (audio && audio.paused) { audio.volume = 0; audio.play().catch(() => {}); }
        navigator.mediaSession.metadata = new MediaMetadata({
            title: video.title,
            artist: 'YouTube Playlist',
            artwork: [{ src: video.thumb, sizes: '512x512', type: 'image/jpeg' }]
        });
        navigator.mediaSession.setActionHandler('play', () => { try { player.playVideo(); } catch(e) {} navigator.mediaSession.playbackState = 'playing'; });
        navigator.mediaSession.setActionHandler('pause', () => { try { player.pauseVideo(); } catch(e) {} navigator.mediaSession.playbackState = 'paused'; });
        navigator.mediaSession.setActionHandler('previoustrack', () => { prevVideo(); });
        navigator.mediaSession.setActionHandler('nexttrack', () => { nextVideo(); });
        navigator.mediaSession.setActionHandler('seekto', (details) => { try { player.seekTo(details.seekTime, true); } catch(e) {} });
        navigator.mediaSession.playbackState = 'playing';
    }

</script>
