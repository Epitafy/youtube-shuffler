<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuffle</title>
    <link rel="icon" type="image/png" href="favicon.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0c;
            --surface: #111114;
            --surface2: #18181d;
            --border: #222228;
            --border2: #2e2e38;
            --text: #e8e8f0;
            --muted: #5a5a6e;
            --accent: #6c63ff;
            --accent-dim: rgba(108,99,255,0.15);
            --accent-glow: rgba(108,99,255,0.3);
            --danger: #ff4f4f;
            --success: #3dffa0;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            overflow: hidden;
        }

        /* ── LAYOUT ── */
        .app {
            display: grid;
            grid-template-rows: 56px 1fr;
            height: 100vh;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .logo {
            font-size: 13px;
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            letter-spacing: 0.12em;
            color: var(--accent);
            white-space: nowrap;
        }

        .url-bar {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .url-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 0 14px;
            height: 34px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .url-input::placeholder { color: var(--muted); }
        .url-input:focus { border-color: var(--accent); }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 34px;
            padding: 0 14px;
            border: none;
            border-radius: 6px;
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { background: #7b73ff; }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; pointer-events: none; }

        .btn-ghost {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border2);
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
        .btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

        .btn-danger {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border2);
        }
        .btn-danger:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,79,79,0.08); }

        .btn-star {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border2);
            font-size: 16px;
        }
        .btn-star:hover { color: #ffc107; border-color: #ffc107; }
        .btn-star.active { color: #ffc107; border-color: #ffc107; }

        /* ── MAIN ── */
        main {
            display: grid;
            grid-template-columns: 1fr 340px;
            overflow: hidden;
        }

        /* ── PLAYER PANE ── */
        .player-pane {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .video-wrap {
            position: relative;
            background: #000;
            flex: 1;
        }
        .video-wrap iframe, #video-placeholder {
            width: 100%;
            height: 100%;
            display: block;
            border: none;
        }

        /* ── DIMMER OVERLAY ── */
        .dimmer-overlay {
            position: absolute;
            inset: 0;
            background: #0a0a0c;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
            z-index: 10;
        }

        /* ── BRIGHTNESS SLIDER ── */
        .brightness-wrap {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-shrink: 0;
        }
        .brightness-icon {
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
            user-select: none;
            font-family: 'DM Mono', monospace;
        }
        .brightness-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 68px;
            height: 3px;
            border-radius: 2px;
            background: var(--border2);
            outline: none;
            cursor: pointer;
        }
        .brightness-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--muted);
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
        }
        .brightness-slider:hover::-webkit-slider-thumb {
            background: var(--text);
            transform: scale(1.25);
        }
        .brightness-slider::-moz-range-thumb {
            width: 11px;
            height: 11px;
            border: none;
            border-radius: 50%;
            background: var(--muted);
            cursor: pointer;
        }


        /* ── BLACKOUT SCREEN ── */
        .blackout-content {
            position: absolute;
            inset: 0;
            z-index: 11;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            pointer-events: none;
        }
        .blackout-content.visible {
            display: flex;
            pointer-events: auto;
            animation: blackoutFadeIn 0.5s ease forwards;
        }

        @keyframes blackoutFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* particles canvas */
        #particleCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .blackout-inner {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        /* vinyl record */
        .vinyl-wrap {
            position: relative;
            width: 88px;
            height: 88px;
        }
        .vinyl {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: conic-gradient(
                #1a1a22 0deg, #0f0f14 30deg, #1a1a22 60deg,
                #0f0f14 90deg, #1a1a22 120deg, #0f0f14 150deg,
                #1a1a22 180deg, #0f0f14 210deg, #1a1a22 240deg,
                #0f0f14 270deg, #1a1a22 300deg, #0f0f14 330deg, #1a1a22 360deg
            );
            animation: spin 8s linear infinite;
            box-shadow: 0 0 0 1px rgba(108,99,255,0.08),
                        0 0 24px rgba(108,99,255,0.12),
                        0 0 60px rgba(108,99,255,0.06);
        }
        .vinyl::before {
            content: '';
            position: absolute;
            inset: 28px;
            border-radius: 50%;
            background: #0a0a0c;
            box-shadow: inset 0 0 8px rgba(108,99,255,0.15);
        }
        .vinyl::after {
            content: '';
            position: absolute;
            inset: 38px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(108,99,255,0.4) 0%, rgba(108,99,255,0.05) 100%);
        }
        .vinyl-grooves {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: repeating-conic-gradient(
                rgba(255,255,255,0.015) 0deg 1deg,
                transparent 1deg 4deg
            );
            animation: spin 8s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .blackout-title {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: rgba(232,232,240,0.3);
            letter-spacing: 0.1em;
            text-align: center;
            max-width: 88%;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            user-select: none;
        }

        .blackout-seek-wrap {
            width: 75%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
        }

        .blackout-seek {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 2px;
            border-radius: 2px;
            background: rgba(255,255,255,0.08);
            outline: none;
            cursor: pointer;
        }
        .blackout-seek::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(108,99,255,0.8);
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
            box-shadow: 0 0 6px rgba(108,99,255,0.6);
        }
        .blackout-seek:hover::-webkit-slider-thumb {
            background: rgba(108,99,255,1);
            transform: scale(1.4);
            box-shadow: 0 0 12px rgba(108,99,255,0.9);
        }
        .blackout-seek::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border: none;
            border-radius: 50%;
            background: rgba(108,99,255,0.8);
            cursor: pointer;
        }
        .blackout-time {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: rgba(232,232,240,0.2);
            letter-spacing: 0.06em;
            user-select: none;
        }

        /* ── EXTRA EYE CANDY ── */

        /* Scanline overlay on video */
        .scanlines {
            position: absolute;
            inset: 0;
            z-index: 9;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            opacity: 0.6;
        }

        /* Active queue item glow bar */
        .video-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent), 0 0 20px var(--accent-glow);
        }

        /* Logo pulse glow */
        .logo {
            animation: logoPulse 4s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% { text-shadow: 0 0 8px rgba(108,99,255,0.3); }
            50%       { text-shadow: 0 0 18px rgba(108,99,255,0.7), 0 0 40px rgba(108,99,255,0.2); }
        }

        /* accent line under header */
        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
            animation: headerGlow 6s ease-in-out infinite;
        }
        header { position: relative; }
        @keyframes headerGlow {
            0%, 100% { opacity: 0.3; }
            50%       { opacity: 1; }
        }

        /* Sidebar active item ambient glow */
        .video-item.active {
            box-shadow: inset 0 0 20px rgba(108,99,255,0.05);
        }

        .placeholder {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
        }
        .placeholder-icon { font-size: 40px; opacity: 0.3; }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
            min-height: 56px;
        }

        .controls .spacer { flex: 1; }

        .current-song {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0;
            padding: 0 12px;
            min-width: 0;
            max-width: 100%;
            cursor: pointer;
            position: relative;
        }

        .current-song-title {
            font-size: 12px;
            color: var(--text);
            font-weight: 500;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            word-break: break-word;
            min-width: 0;
            opacity: 1;
            transition: opacity 0.3s ease;
            position: absolute;
            left: 12px;
            right: 0;
        }

        .current-song-title.fade-out {
            opacity: 0;
        }

        .current-song-title.fade-in {
            opacity: 1;
        }

        .btn-repeat {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border2);
            position: relative;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .btn-repeat:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }
        
        .btn-repeat.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }
        
        .btn-repeat.one {
            border-color: var(--success);
            color: var(--success);
        }
        
        .btn-repeat-indicator {
            position: absolute;
            bottom: -6px;
            right: -6px;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            font-size: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
        }

        /* ── QUEUE PANE ── */
        .queue-pane {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--surface);
        }

        .queue-header {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .queue-label {
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
        }
        .queue-count {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.1;
            margin-top: 2px;
        }
        .queue-count span { color: var(--accent); }

        .queue-tabs {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--muted);
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'DM Mono', monospace;
        }

        .tab-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .queue-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .queue-list::-webkit-scrollbar { width: 4px; }
        .queue-list::-webkit-scrollbar-track { background: transparent; }
        .queue-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        .video-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .video-item:hover { background: var(--surface2); }
        .video-item.active {
            background: var(--accent-dim);
            border-left: 2px solid var(--accent);
            padding-left: 14px;
        }

        .video-item img {
            width: 76px;
            height: 42px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--border);
        }

        .video-item-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
        }

        .video-title {
            font-size: 11.5px;
            line-height: 1.4;
            color: var(--text);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .video-item.active .video-title { color: #fff; }

        .video-meta {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
        }

        .playlist-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            border: 1px solid var(--border2);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            margin: 0 12px 8px 12px;
            min-width: 0;
            position: relative;  /* ← добавь это */
        }

        .playlist-item:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .playlist-item-title {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.3;
            color: var(--text);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            word-break: break-word;
        }

        .playlist-item-meta {
            display: flex;
            justify-content: space-between;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            gap: 8px;
        }

        .delete-btn {
            padding: 2px 4px;
            font-size: 9px;
            border: none;
            background: transparent;
            color: var(--muted);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
            position: absolute;
            top: 30px;
            right: 8px;
        }

        .delete-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* ── EMPTY / ERROR STATES ── */
        .state-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 8px;
            color: var(--muted);
            font-size: 12px;
            font-family: 'DM Mono', monospace;
            text-align: center;
            padding: 20px;
        }
        .state-empty-icon { font-size: 28px; opacity: 0.25; margin-bottom: 4px; }

        /* ── LOADING ── */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid var(--border2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .url-bar:has(#load-btn:disabled) .spinner {
            display: block;
        }

        /* ── BUTTON PRESS ANIMATIONS ── */
        .btn:active, .tab-btn:active {
            transform: scale(0.93);
            transition: transform 0.08s ease !important;
        }


        /* pause vinyl when paused */
        .vinyl-paused .vinyl,
        .vinyl-paused .vinyl-grooves {
            animation-play-state: paused;
        }

        .vinyl-wrap {
            transition: transform 0.08s ease;
        }
        .vinyl-wrap:active {
            transform: scale(0.93);
        }
    </style>
</head>
<body>


<!-- Silent audio to capture media session from YouTube iframe -->
<audio id="silentAudio" loop>
    <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
</audio>
<div class="app">
    <header>
        <div class="logo">▶ SHUFFLE</div>
        <div class="url-bar">
            <input type="text" id="playlist-url" class="url-input" placeholder="Paste YouTube playlist link...">
            <div class="spinner" id="spinner"></div>
            <button id="load-btn" class="btn btn-primary" onclick="loadPlaylist()">Load</button>
            <button id="star-btn" class="btn btn-star" onclick="toggleFavorite()" title="Add to favorites">★</button>
        </div>
    </header>

    <main>
        <div id="player-section" class="player-pane">
            <div id="video-container" class="video-wrap">
                <div class="dimmer-overlay" id="dimmerOverlay"></div>
                <div class="blackout-content" id="blackoutContent">
                    <div class="blackout-inner">
                        <div class="vinyl-wrap" onclick="toggleBlackoutPlay()" title="Play / Pause" style="cursor:pointer">
                            <div class="vinyl"></div>
                            <div class="vinyl-grooves"></div>
                        </div>
                        <div class="blackout-title" id="blackoutTitle">—</div>

                        <div class="blackout-seek-wrap">
                            <input type="range" class="blackout-seek" id="blackoutSeek" min="0" max="100" value="0" oninput="seekFromBlackout(this.value)">
                            <div class="blackout-time" id="blackoutTime">0:00 / 0:00</div>
                        </div>
                    </div>
                </div>
                <div id="video-placeholder">
                    <div class="placeholder">
                        <div class="placeholder-icon">◈</div>
                        <div>Load playlist to start</div>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn btn-ghost" onclick="prevVideo()">◀</button>
                <button class="btn btn-ghost" onclick="nextVideo()">▶</button>
                
                <div class="current-song" id="current-song">
                    <span class="current-song-title fade-in" id="current-song-title" title="">Loading...</span>
                </div>
                
                <button id="repeat-btn" class="btn btn-repeat" onclick="toggleRepeat()" title="Repeat">↻</button>
                <button class="btn btn-ghost" onclick="shufflePlaylist()">⇄ Shuffle</button>
                <button class="btn btn-danger" onclick="unshufflePlaylist()">↺ Unshuffle</button>
                <div class="brightness-wrap">
                    <span class="brightness-icon" id="brightnessIcon" onclick="toggleBlackout()" style="cursor:pointer;user-select:none" title="Toggle blackout">☀</span>
                    <input type="range" class="brightness-slider" id="brightnessSlider" min="0" max="85" value="0" oninput="setDim(this.value)" title="Dim player">
                </div>
            </div>
        </div>

        <aside id="sidebar" class="queue-pane">
            <div class="queue-tabs">
                <button class="tab-btn active" onclick="switchTab('queue')">Queue</button>
                <button class="tab-btn" onclick="switchTab('favorites')">★ Favorites</button>
            </div>
            
            <div id="queue-section" style="display: flex; flex-direction: column; overflow: hidden; flex: 1;">
                <div class="queue-header">
                    <div class="queue-label">Queue</div>
                    <div class="queue-count"><span id="video-count">0 videos</span></div>
                </div>
                <div id="playlist-items" class="queue-list">
                    <div class="state-empty">
                        <div class="state-empty-icon">☰</div>
                        <div>Paste link</div>
                    </div>
                </div>
            </div>

            <div id="favorites-section" style="display: none; flex-direction: column; overflow: hidden; flex: 1;">
                <div class="queue-header">
                    <div class="queue-label">Favorites</div>
                    <div class="queue-count"><span id="favorites-count">0 saved</span></div>
                </div>
                <div id="favorites-list" class="queue-list">
                    <div class="state-empty">
                        <div class="state-empty-icon">★</div>
                        <div>No saved playlists</div>
                    </div>
                </div>
            </div>
        </aside>
    </main>
</div>

<script>
    // --- CONFIG ---
    const API_KEY = 'AIzaSyBaIt7mKZFhneA4vpnTGGrj091rPc0KvCE'; 
    
    let player;
    let originalList = [];
    let currentQueue = [];
    let currentIndex = 0;
    let currentPlaylistUrl = '';
    let currentPlaylistTitle = '';
    let favorites = [];
    let repeatMode = 0;
    let isShowingPlaylistName = false;
    let hoverTimeout;
    let leaveTimeout;
    let lastMouseY = 0;
    let horizontalTolerance = 0;

    // Load favorites from localStorage
    function loadFavorites() {
        const stored = localStorage.getItem('shuffleFavorites');
        favorites = stored ? JSON.parse(stored) : [];
        updateFavoritesUI();
    }

    // Save favorites to localStorage
    function saveFavorites() {
        localStorage.setItem('shuffleFavorites', JSON.stringify(favorites));
    }

    // Calculate horizontal tolerance based on song name length
    function calculateTolerance() {
        const titleEl = document.getElementById('current-song-title');
        const textLength = titleEl.textContent.length;
        // Примерно 6px за символ, минимум 50px
        horizontalTolerance = Math.max(50, textLength * 6);
    }

    // Handle mouse enter
    function handleSongMouseEnter(e) {
        clearTimeout(leaveTimeout);
        
        hoverTimeout = setTimeout(() => {
            showPlaylistName();
        }, 200);
    }

    // Handle mouse leave
    function handleSongMouseLeave(e) {
        clearTimeout(hoverTimeout);
        
        const songElement = document.getElementById('current-song');
        const rect = songElement.getBoundingClientRect();
        
        leaveTimeout = setTimeout(() => {
            // Проверяем, вернулась ли мышка в зону
            if (e.clientY < rect.top - 20 || e.clientY > rect.bottom + 20) {
                showSongName();
            }
        }, 100);
    }

    // Track mouse move for tolerance
    document.addEventListener('mousemove', (e) => {
        const songElement = document.getElementById('current-song');
        if (!songElement) return;
        
        const rect = songElement.getBoundingClientRect();
        
        // Вертикальный допуск: 20px сверху и снизу
        const verticalTolerance = 20;
        
        // Горизонтальный допуск: адаптивный
        const isInVerticalZone = e.clientY >= rect.top - verticalTolerance && 
                                 e.clientY <= rect.bottom + verticalTolerance;
        
        const isInHorizontalZone = e.clientX >= rect.left - horizontalTolerance && 
                                   e.clientX <= rect.right + horizontalTolerance;
        
        if (isShowingPlaylistName && (!isInVerticalZone || !isInHorizontalZone)) {
            showSongName();
        }
    });

    // Show playlist name with animation
    function showPlaylistName() {
        if (isShowingPlaylistName || !currentPlaylistTitle) return;
        isShowingPlaylistName = true;
        
        const titleEl = document.getElementById('current-song-title');
        
        titleEl.classList.remove('fade-in');
        titleEl.classList.add('fade-out');
        
        setTimeout(() => {
            titleEl.textContent = currentPlaylistTitle;
            titleEl.title = currentPlaylistTitle;
            titleEl.classList.remove('fade-out');
            titleEl.classList.add('fade-in');
        }, 150);
    }

    // Show song name with animation
    function showSongName() {
        if (!isShowingPlaylistName) return;
        isShowingPlaylistName = false;
        
        const titleEl = document.getElementById('current-song-title');
        
        titleEl.classList.remove('fade-in');
        titleEl.classList.add('fade-out');
        
        setTimeout(() => {
            if (currentQueue.length === 0) {
                titleEl.textContent = 'No songs';
                titleEl.title = '';
            } else {
                const currentSong = currentQueue[currentIndex];
                titleEl.textContent = currentSong.title;
                titleEl.title = currentSong.title;
            }
            titleEl.classList.remove('fade-out');
            titleEl.classList.add('fade-in');
            calculateTolerance();
        }, 150);
    }

    // Update current song display
    function updateCurrentSongDisplay() {
        if (isShowingPlaylistName) return;
        
        const titleEl = document.getElementById('current-song-title');
        
        if (currentQueue.length === 0) {
            titleEl.textContent = 'No songs';
            titleEl.title = '';
        } else {
            const currentSong = currentQueue[currentIndex];
            titleEl.textContent = currentSong.title;
            titleEl.title = currentSong.title;
        }
        
        calculateTolerance();
    }

    // Toggle repeat mode
    function toggleRepeat() {
        repeatMode = (repeatMode + 1) % 3;
        updateRepeatButton();
    }

    // Update repeat button appearance
    function updateRepeatButton() {
        const btn = document.getElementById('repeat-btn');
        btn.classList.remove('active', 'one');
        
        if (repeatMode === 0) {
            btn.innerHTML = '↻';
            btn.title = 'No repeat';
        } else if (repeatMode === 1) {
            btn.classList.add('active');
            btn.innerHTML = '↻<div class="btn-repeat-indicator">∞</div>';
            btn.title = 'Repeat all';
        } else if (repeatMode === 2) {
            btn.classList.add('one');
            btn.innerHTML = '↻<div class="btn-repeat-indicator">1</div>';
            btn.title = 'Repeat one';
        }
    }

    // Switch tabs
    function switchTab(tab) {
        const queueSection = document.getElementById('queue-section');
        const favSection = document.getElementById('favorites-section');
        const tabs = document.querySelectorAll('.tab-btn');

        if (tab === 'queue') {
            queueSection.style.display = 'flex';
            favSection.style.display = 'none';
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        } else {
            queueSection.style.display = 'none';
            favSection.style.display = 'flex';
            tabs[0].classList.remove('active');
            tabs[1].classList.add('active');
        }
    }

    // Toggle favorite
    function toggleFavorite() {
        if (!currentPlaylistUrl) {
            alert('Load playlist first');
            return;
        }

        const existingIndex = favorites.findIndex(f => f.url === currentPlaylistUrl);
        const starBtn = document.getElementById('star-btn');

        if (existingIndex > -1) {
            favorites.splice(existingIndex, 1);
            starBtn.classList.remove('active');
        } else {
            favorites.push({
                url: currentPlaylistUrl,
                title: currentPlaylistTitle,
                videoCount: currentQueue.length,
                savedAt: new Date().toISOString()
            });
            starBtn.classList.add('active');
        }

        saveFavorites();
        updateFavoritesUI();
    }

    // Update favorites UI
    function updateFavoritesUI() {
        const favList = document.getElementById('favorites-list');
        document.getElementById('favorites-count').innerText = `${favorites.length} saved`;

        if (favorites.length === 0) {
            favList.innerHTML = `
                <div class="state-empty">
                    <div class="state-empty-icon">★</div>
                    <div>No saved playlists</div>
                </div>
            `;
            return;
        }

        favList.innerHTML = '';
        favorites.forEach((fav, index) => {
            const div = document.createElement('div');
            div.className = 'playlist-item';
            div.onclick = () => loadFavoritPlaylist(index);
            const date = new Date(fav.savedAt).toLocaleDateString('en-US');
            
            div.innerHTML = `
                <div class="playlist-item-title" title="${fav.title}">${fav.title}</div>
                <div class="playlist-item-meta">
                    <span>${fav.videoCount} videos</span>
                </div>
                <button class="delete-btn" onclick="event.stopPropagation(); deleteFavorite(${index})">🗑️</button>
            `;
            favList.appendChild(div);
        });
    }

    // Load favorite playlist
    function loadFavoritPlaylist(index) {
        if (index < 0 || index >= favorites.length) return;
        
        const fav = favorites[index];
        document.getElementById('playlist-url').value = fav.url;
        loadPlaylist();
    }

    // Delete favorite
    function deleteFavorite(index) {
        if (confirm('Are you sure?')) {
            const deletedUrl = favorites[index].url;
            favorites.splice(index, 1);
            saveFavorites();
            updateFavoritesUI();
            
            if (currentPlaylistUrl === deletedUrl) {
                document.getElementById('star-btn').classList.remove('active');
            }
        }
    }

    // Update star button status
    function updateStarButton() {
        const starBtn = document.getElementById('star-btn');
        const isFavorite = favorites.some(f => f.url === currentPlaylistUrl);
        
        if (isFavorite) {
            starBtn.classList.add('active');
        } else {
            starBtn.classList.remove('active');
        }
    }

    // Get playlist title from YouTube
    async function getPlaylistTitle(playlistId) {
        try {
            const apiUrl = `https://www.googleapis.com/youtube/v3/playlists?part=snippet&id=${playlistId}&key=${API_KEY}`;
            const response = await fetch(apiUrl);
            const data = await response.json();
            
            if (data.items && data.items.length > 0) {
                return data.items[0].snippet.title;
            }
            return `Playlist ${new Date().toLocaleString()}`;
        } catch (error) {
            console.error("Error fetching playlist title:", error);
            return `Playlist ${new Date().toLocaleString()}`;
        }
    }

    // Initialize YouTube API
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('video-placeholder', {
            events: {
                'onStateChange': (e) => {
                    if (e.data === YT.PlayerState.ENDED) handleVideoEnd();
                },
                'onError': (e) => {
                    console.error("Player error:", e.data);
                    setTimeout(nextVideo, 2000);
                }
            }
        });
        
        loadFavorites();
        
        // Добавляем event listeners к элементу песни
        const songElement = document.getElementById('current-song');
        songElement.addEventListener('mouseenter', handleSongMouseEnter);
        songElement.addEventListener('mouseleave', handleSongMouseLeave);
    }

    // Handle video end with repeat mode
    function handleVideoEnd() {
        if (repeatMode === 2) {
            playVideo(currentIndex);
        } else {
            nextVideo();
        }
    }

    async function loadPlaylist() {
        const url = document.getElementById('playlist-url').value;
        const match = url.match(/[&?]list=([^&]+)/);
        const playlistId = match ? match[1] : null;
        
        if (!playlistId) {
            alert('Please paste a valid YouTube playlist link');
            return;
        }

        currentPlaylistUrl = url;
        const btn = document.getElementById('load-btn');
        btn.disabled = true;
        btn.innerText = "Loading...";

        try {
            currentPlaylistTitle = await getPlaylistTitle(playlistId);
            
            originalList = [];
            let nextPageToken = '';
            
            do {
                const apiUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${API_KEY}&pageToken=${nextPageToken}`;
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.error) throw new Error(data.error.message);

                const items = data.items.map(item => {
                    const s = item.snippet;
                    const thumb = s.thumbnails?.medium?.url || s.thumbnails?.default?.url || 'https://via.placeholder.com/120x68?text=No+Thumb';
                    
                    return {
                        id: s.resourceId.videoId,
                        title: s.title,
                        thumb: thumb
                    };
                });

                originalList = originalList.concat(items);
                nextPageToken = data.nextPageToken;
                
                btn.innerText = `Loaded ${originalList.length}...`;
            } while (nextPageToken);

            currentQueue = [...originalList];
            document.getElementById('video-count').innerText = `${originalList.length} videos`;
            
            currentIndex = 0;
            repeatMode = 0;
            updateRepeatButton();
            renderList();
            playVideo(0);
            updateStarButton();

        } catch (error) {
            console.error("API Error:", error);
            alert("Error loading playlist: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Load";
        }
    }

    function renderList() {
        const container = document.getElementById('playlist-items');
        container.innerHTML = '';
        
        const fragment = document.createDocumentFragment();

        currentQueue.forEach((video, index) => {
            const div = document.createElement('div');
            div.className = `video-item ${index === currentIndex ? 'active' : ''}`;
            div.id = `v-${index}`;
            div.onclick = () => playVideo(index);
            
            div.innerHTML = `
                <img src="${video.thumb}" loading="lazy">
                <div class="video-item-info">
                    <div class="video-title">${video.title}</div>
                    <div class="video-meta">#${index + 1} in queue</div>
                </div>
            `;
            fragment.appendChild(div);
        });

        container.appendChild(fragment);

        const activeElem = document.getElementById(`v-${currentIndex}`);
        if (activeElem) activeElem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function playVideo(index) {
        if (index < 0 || index >= currentQueue.length) return;
        
        currentIndex = index;
        player.loadVideoById(currentQueue[currentIndex].id);
        updateMediaSession();
        
        if (!isShowingPlaylistName) {
            updateCurrentSongDisplay();
        }
        
        document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
        const activeElem = document.getElementById(`v-${currentIndex}`);
        if (activeElem) {
            activeElem.classList.add('active');
            activeElem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    function nextVideo() {
        if (currentIndex < currentQueue.length - 1) {
            playVideo(currentIndex + 1);
        } else if (repeatMode === 1) {
            playVideo(0);
        }
    }

    function prevVideo() {
        if (currentIndex > 0) playVideo(currentIndex - 1);
    }

    function shufflePlaylist() {
        if (currentQueue.length === 0) return;

        for (let i = currentQueue.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentQueue[i], currentQueue[j]] = [currentQueue[j], currentQueue[i]];
        }

        currentIndex = 0;
        playVideo(currentIndex);
        renderList();
    }

    function unshufflePlaylist() {
        if (originalList.length === 0) return;
        
        const currentVideo = currentQueue[currentIndex];
        currentQueue = [...originalList];
        currentIndex = currentQueue.indexOf(currentVideo);
        playVideo(currentIndex);
        renderList();
    }
    let isBlackedOut = false;

    let seekPollInterval = null;

    function toggleBlackout() {
        isBlackedOut = !isBlackedOut;
        const icon = document.getElementById("brightnessIcon");
        const blackoutEl = document.getElementById("blackoutContent");
        if (isBlackedOut) {
            document.getElementById("dimmerOverlay").style.opacity = "1";
            icon.style.color = "var(--accent)";
            icon.title = "Restore video";
            blackoutEl.classList.add("visible");
            // Set title
            const titleEl = document.getElementById("current-song-title");
            document.getElementById("blackoutTitle").textContent = titleEl ? titleEl.textContent : "—";
            startSeekPoll();
        } else {
            const slider = document.getElementById("brightnessSlider");
            setDim(slider.value);
            icon.style.color = "";
            icon.title = "Toggle blackout";
            blackoutEl.classList.remove("visible");
            stopSeekPoll();
        }
    }

    function setDim(value) {
        if (isBlackedOut) return;
        const overlay = document.getElementById("dimmerOverlay");
        overlay.style.opacity = (value / 100).toFixed(2);
        const slider = document.getElementById("brightnessSlider");
        const pct = (value / 85) * 100;
        slider.style.background = `linear-gradient(to right, var(--border) ${pct}%, var(--border2) ${pct}%)`;
    }

    function formatTime(sec) {
        if (!sec || isNaN(sec)) return "0:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ":" + String(s).padStart(2, "0");
    }

    function startSeekPoll() {
        stopSeekPoll();
        seekPollInterval = setInterval(() => {
            if (!player || typeof player.getCurrentTime !== "function") return;
            try {
                const cur = player.getCurrentTime();
                const dur = player.getDuration();
                if (dur > 0) {
                    const pct = (cur / dur) * 100;
                    const seekEl = document.getElementById("blackoutSeek");
                    seekEl.value = pct;
                    seekEl.style.background = `linear-gradient(to right, rgba(255,255,255,0.35) ${pct}%, rgba(255,255,255,0.08) ${pct}%)`;
                    document.getElementById("blackoutTime").textContent = formatTime(cur) + " / " + formatTime(dur);
                }
                // keep title in sync
                const titleEl = document.getElementById("current-song-title");
                if (titleEl) document.getElementById("blackoutTitle").textContent = titleEl.textContent;
            } catch(e) {}
        }, 1000);
    }

    function stopSeekPoll() {
        if (seekPollInterval) { clearInterval(seekPollInterval); seekPollInterval = null; }
    }

    function seekFromBlackout(pct) {
        if (!player || typeof player.getDuration !== "function") return;
        try {
            const dur = player.getDuration();
            player.seekTo((pct / 100) * dur, true);
            const seekEl = document.getElementById("blackoutSeek");
            seekEl.style.background = `linear-gradient(to right, rgba(255,255,255,0.35) ${pct}%, rgba(255,255,255,0.08) ${pct}%)`;
        } catch(e) {}
    }

    // ── MEDIA SESSION API (наушники / медиаклавиши) ──
    function updateMediaSession() {
        if (!('mediaSession' in navigator)) return;
        const video = currentQueue[currentIndex];
        if (!video) return;

        // Play silent audio to take over media session from YouTube iframe
        const audio = document.getElementById('silentAudio');
        if (audio && audio.paused) {
            audio.volume = 0;
            audio.play().catch(() => {});
        }

        navigator.mediaSession.metadata = new MediaMetadata({
            title: video.title,
            artist: 'YouTube Playlist',
            artwork: [{ src: video.thumb, sizes: '512x512', type: 'image/jpeg' }]
        });

        navigator.mediaSession.setActionHandler('play', () => {
            try { player.playVideo(); } catch(e) {}
            navigator.mediaSession.playbackState = 'playing';
        });
        navigator.mediaSession.setActionHandler('pause', () => {
            try { player.pauseVideo(); } catch(e) {}
            navigator.mediaSession.playbackState = 'paused';
        });
        navigator.mediaSession.setActionHandler('previoustrack', () => {
            prevVideo();
        });
        navigator.mediaSession.setActionHandler('nexttrack', () => {
            nextVideo();
        });
        navigator.mediaSession.setActionHandler('seekto', (details) => {
            try { player.seekTo(details.seekTime, true); } catch(e) {}
        });

        navigator.mediaSession.playbackState = 'playing';
    }


    // ── PARTICLE SYSTEM ──
    let particleAnim = null;
    const particles = [];

    function initParticles() {
        const canvas = document.getElementById('particleCanvas');
        if (!canvas) return;
        const container = canvas.parentElement;
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;
        const ctx = canvas.getContext('2d');
        particles.length = 0;

        const count = 38;
        for (let i = 0; i < count; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.4 + 0.3,
                vx: (Math.random() - 0.5) * 0.25,
                vy: (Math.random() - 0.5) * 0.25,
                alpha: Math.random() * 0.25 + 0.05,
                pulse: Math.random() * Math.PI * 2,
                pulseSpeed: Math.random() * 0.012 + 0.004,
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.pulse += p.pulseSpeed;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                const a = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(108,99,255,${a})`;
                ctx.fill();
            });
            particleAnim = requestAnimationFrame(draw);
        }
        draw();
    }

    function stopParticles() {
        if (particleAnim) { cancelAnimationFrame(particleAnim); particleAnim = null; }
        const canvas = document.getElementById('particleCanvas');
        if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    }


    function toggleBlackoutPlay() {
        if (!player || typeof player.getPlayerState !== 'function') return;
        const state = player.getPlayerState();
        const btn = document.getElementById('blackoutPlayPause');
        const vinylWrap = document.querySelector('.vinyl-wrap');
        if (state === 1) { // playing → pause
            player.pauseVideo();
            btn.textContent = '▶';
            vinylWrap.classList.add('vinyl-paused');
        } else { // paused → play
            player.playVideo();
            btn.textContent = '⏸';
            vinylWrap.classList.remove('vinyl-paused');
        }
    }

</script>
</body>
